<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chronos — Time Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&family=DM+Sans:wght@400;500;600&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-deep: #0a0b10;
  --bg-base: #0f1018;
  --bg-surface: #161722;
  --bg-elevated: #1c1d2e;
  --bg-hover: #22233a;
  --border: rgba(255,255,255,0.06);
  --border-accent: rgba(80,220,210,0.15);
  --text-primary: #e8eaf0;
  --text-secondary: #8b8ea3;
  --text-tertiary: #555770;
  --accent-cyan: #50dcd2;
  --accent-cyan-dim: rgba(80,220,210,0.15);
  --accent-purple: #9b7cf7;
  --accent-purple-dim: rgba(155,124,247,0.12);
  --accent-amber: #f0c050;
  --accent-amber-dim: rgba(240,192,80,0.12);
  --accent-rose: #f06888;
  --accent-rose-dim: rgba(240,104,136,0.12);
  --accent-blue: #5b9cf7;
  --accent-blue-dim: rgba(91,156,247,0.12);
  --accent-green: #5cd0a0;
  --accent-green-dim: rgba(92,208,160,0.12);
  --glass: rgba(22,23,34,0.7);
  --glass-border: rgba(255,255,255,0.08);
  --radius-sm: 8px;
  --radius-md: 14px;
  --radius-lg: 20px;
  --radius-xl: 28px;
  --shadow-glow: 0 0 60px rgba(80,220,210,0.08);
  --sidebar-width: 260px;
  --font-display: 'Outfit', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

/* ═══ HOT GIRL MODE ═══ */
[data-theme="hotgirl"] {
  --bg-deep: #fff0f5;
  --bg-base: #fff5f8;
  --bg-surface: #ffe4ee;
  --bg-elevated: #ffd6e5;
  --bg-hover: #ffcadd;
  --border: rgba(200,50,120,0.1);
  --border-accent: rgba(255,50,130,0.2);
  --text-primary: #4a1030;
  --text-secondary: #8a4068;
  --text-tertiary: #b87a98;
  --accent-cyan: #ff3a8c;
  --accent-cyan-dim: rgba(255,58,140,0.12);
  --accent-purple: #c74aff;
  --accent-purple-dim: rgba(199,74,255,0.12);
  --accent-amber: #ff8c3a;
  --accent-amber-dim: rgba(255,140,58,0.12);
  --accent-rose: #ff3a6e;
  --accent-rose-dim: rgba(255,58,110,0.12);
  --accent-blue: #a04aff;
  --accent-blue-dim: rgba(160,74,255,0.12);
  --accent-green: #3adfb0;
  --accent-green-dim: rgba(58,223,176,0.12);
  --glass: rgba(255,240,245,0.75);
  --glass-border: rgba(255,100,160,0.12);
  --shadow-glow: 0 0 60px rgba(255,58,140,0.1);
  --font-display: 'Quicksand', sans-serif;
  --font-body: 'Quicksand', sans-serif;
}

[data-theme="hotgirl"] body::before {
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(255,58,140,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 80%, rgba(199,74,255,0.05) 0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 50% 50%, rgba(255,140,58,0.03) 0%, transparent 60%) !important;
}

[data-theme="hotgirl"] .logo-icon {
  background: linear-gradient(135deg, #ff3a8c, #c74aff);
}

[data-theme="hotgirl"] .timer-glow {
  background: radial-gradient(circle, rgba(255,58,140,0.18) 0%, transparent 70%);
}

[data-theme="hotgirl"] .timer-btn.start {
  background: linear-gradient(135deg, #ff3a8c, #ff6aaa);
  box-shadow: 0 4px 24px rgba(255,58,140,0.3);
}

[data-theme="hotgirl"] .timer-btn.start:hover {
  box-shadow: 0 6px 32px rgba(255,58,140,0.4);
}

[data-theme="hotgirl"] .timer-btn.stop {
  background: linear-gradient(135deg, #c74aff, #a030dd);
  box-shadow: 0 4px 24px rgba(199,74,255,0.3);
}

[data-theme="hotgirl"] .timer-ring.running {
  border-color: rgba(255,58,140,0.25);
}

[data-theme="hotgirl"] .orbital-dot {
  background: #ff3a8c;
  box-shadow: 0 0 12px rgba(255,58,140,0.6);
}

[data-theme="hotgirl"] .pulse-dot {
  background: #ff3a8c;
  animation-name: pulse-dot-hot;
}

@keyframes pulse-dot-hot {
  0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(255,58,140,0.4); }
  50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(255,58,140,0); }
}

[data-theme="hotgirl"] .bar-col.today .bar {
  background: linear-gradient(180deg, #ff3a8c, rgba(255,58,140,0.5));
  box-shadow: 0 0 16px rgba(255,58,140,0.25);
}

[data-theme="hotgirl"] .bar {
  background: linear-gradient(180deg, #ff3a8c, rgba(255,58,140,0.3));
}

[data-theme="hotgirl"] .nav-item.active {
  background: rgba(255,58,140,0.1);
  color: #ff3a8c;
}

[data-theme="hotgirl"] .nav-item.active::before {
  background: #ff3a8c;
}

[data-theme="hotgirl"] .sidebar-timer-indicator {
  background: rgba(255,58,140,0.06);
  border-color: rgba(255,58,140,0.12);
}

[data-theme="hotgirl"] .sidebar-timer-text { color: #ff3a8c; }

[data-theme="hotgirl"] .btn-primary {
  background: #ff3a8c;
  color: white;
}

[data-theme="hotgirl"] .logo-text {
  background: linear-gradient(135deg, #4a1030, #8a4068);
  -webkit-background-clip: text;
}

[data-theme="hotgirl"] .today-total,
[data-theme="hotgirl"] .stat-change { color: #ff3a8c; }

[data-theme="hotgirl"] ::selection {
  background: rgba(255,58,140,0.25);
  color: #4a1030;
}

[data-theme="hotgirl"] ::-webkit-scrollbar-thumb { background: #ffc0d8; }
[data-theme="hotgirl"] ::-webkit-scrollbar-thumb:hover { background: #ff8ab8; }

/* Theme switcher */
.theme-switcher {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  margin: 0 12px 16px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.2s ease;
  user-select: none;
}

.theme-switcher:hover { background: var(--bg-hover); }

.theme-switch-track {
  width: 44px;
  height: 24px;
  border-radius: 12px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  position: relative;
  transition: all 0.35s cubic-bezier(0.4,0,0.2,1);
  flex-shrink: 0;
}

.theme-switch-thumb {
  position: absolute;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  top: 2px;
  left: 2px;
  background: var(--text-tertiary);
  transition: all 0.35s cubic-bezier(0.4,0,0.2,1);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
}

[data-theme="hotgirl"] .theme-switch-track {
  background: linear-gradient(135deg, #ff3a8c, #c74aff);
  border-color: transparent;
}

[data-theme="hotgirl"] .theme-switch-thumb {
  left: 22px;
  background: white;
}

.theme-label {
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--text-secondary);
  transition: color 0.2s ease;
}

[data-theme="hotgirl"] .theme-label { color: #ff3a8c; }

/* Smooth transition for theme changes */
html.theme-transitioning,
html.theme-transitioning *,
html.theme-transitioning *::before,
html.theme-transitioning *::after {
  transition-duration: 0.5s !important;
}

html { font-size: 16px; }
body {
  font-family: var(--font-body);
  background: var(--bg-deep);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ═══ Background Atmosphere ═══ */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(80,220,210,0.04) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 80%, rgba(155,124,247,0.03) 0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 50% 50%, rgba(240,192,80,0.015) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* Noise texture overlay */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  opacity: 0.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 200px;
  pointer-events: none;
  z-index: 0;
}

/* ═══ Layout ═══ */
.app { display: flex; min-height: 100vh; position: relative; z-index: 1; }

/* ═══ Sidebar ═══ */
.sidebar {
  width: var(--sidebar-width);
  background: var(--bg-base);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0;
  left: 0;
  bottom: 0;
  z-index: 100;
  transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
}

.sidebar-header {
  padding: 28px 24px 20px;
  border-bottom: 1px solid var(--border);
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-icon {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

.logo-icon::after {
  content: '';
  position: absolute;
  inset: 2px;
  border-radius: 8px;
  background: var(--bg-base);
}

.logo-icon svg { position: relative; z-index: 1; }

.logo-text {
  font-family: var(--font-display);
  font-size: 1.25rem;
  font-weight: 600;
  letter-spacing: -0.02em;
  background: linear-gradient(135deg, var(--text-primary), var(--text-secondary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.sidebar-nav {
  padding: 16px 12px;
  flex: 1;
}

.nav-label {
  font-size: 0.65rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-tertiary);
  padding: 12px 12px 8px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 14px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.2s ease;
  color: var(--text-secondary);
  font-size: 0.9rem;
  font-weight: 500;
  position: relative;
  margin-bottom: 2px;
}

.nav-item:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}

.nav-item.active {
  background: var(--accent-cyan-dim);
  color: var(--accent-cyan);
}

.nav-item.active::before {
  content: '';
  position: absolute;
  left: 0;
  top: 50%;
  transform: translateY(-50%);
  width: 3px;
  height: 20px;
  border-radius: 0 3px 3px 0;
  background: var(--accent-cyan);
}

.nav-item svg {
  width: 18px;
  height: 18px;
  opacity: 0.7;
  flex-shrink: 0;
}

.nav-item.active svg { opacity: 1; }

/* Active timer indicator in sidebar */
.sidebar-timer-indicator {
  margin: auto 12px 16px;
  padding: 12px 14px;
  border-radius: var(--radius-md);
  background: rgba(80,220,210,0.06);
  border: 1px solid rgba(80,220,210,0.1);
  display: none;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  transition: all 0.2s ease;
}

.sidebar-timer-indicator:hover {
  background: rgba(80,220,210,0.1);
}

.sidebar-timer-indicator.visible { display: flex; }

.pulse-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--accent-cyan);
  animation: pulse-dot 2s ease-in-out infinite;
  flex-shrink: 0;
}

@keyframes pulse-dot {
  0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(80,220,210,0.4); }
  50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(80,220,210,0); }
}

.sidebar-timer-text {
  font-family: var(--font-mono);
  font-size: 0.8rem;
  color: var(--accent-cyan);
  font-weight: 500;
}

.sidebar-timer-project {
  font-size: 0.72rem;
  color: var(--text-secondary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ═══ Main Content ═══ */
.main {
  margin-left: var(--sidebar-width);
  flex: 1;
  min-height: 100vh;
  padding: 0;
}

.view {
  display: none;
  padding: 36px 44px;
  max-width: 960px;
  animation: fadeIn 0.35s ease;
}

.view.active { display: block; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.view-header {
  margin-bottom: 32px;
}

.view-title {
  font-family: var(--font-display);
  font-size: 1.75rem;
  font-weight: 600;
  letter-spacing: -0.03em;
  color: var(--text-primary);
}

.view-subtitle {
  font-size: 0.88rem;
  color: var(--text-secondary);
  margin-top: 6px;
}

/* ═══ Timer View ═══ */
.timer-hero {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 48px 0 40px;
  position: relative;
}

.timer-ring-container {
  position: relative;
  width: 280px;
  height: 280px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 36px;
}

/* Orbital ring */
.timer-ring {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  border: 1px solid var(--border);
  transition: border-color 0.6s ease;
}

.timer-ring.running {
  border-color: rgba(80,220,210,0.2);
}

/* Orbiting dot */
.orbital-dot {
  position: absolute;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--accent-cyan);
  top: -4px;
  left: 50%;
  margin-left: -4px;
  opacity: 0;
  box-shadow: 0 0 12px rgba(80,220,210,0.5);
  transition: opacity 0.5s ease;
}

.timer-ring.running .orbital-dot {
  opacity: 1;
  animation: orbit 8s linear infinite;
}

@keyframes orbit {
  from { transform: rotate(0deg) translateY(140px) rotate(0deg); }
  to { transform: rotate(360deg) translateY(140px) rotate(-360deg); }
}

/* Glow behind timer */
.timer-glow {
  position: absolute;
  width: 200px;
  height: 200px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(80,220,210,0.12) 0%, transparent 70%);
  opacity: 0;
  transition: opacity 0.8s ease;
  pointer-events: none;
}

.timer-glow.running {
  opacity: 1;
  animation: breathe 3s ease-in-out infinite;
}

@keyframes breathe {
  0%, 100% { transform: scale(1); opacity: 0.8; }
  50% { transform: scale(1.15); opacity: 1; }
}

.timer-display {
  font-family: var(--font-mono);
  font-size: 4rem;
  font-weight: 300;
  letter-spacing: 0.04em;
  color: var(--text-primary);
  position: relative;
  z-index: 2;
  transition: color 0.4s ease;
  line-height: 1;
}

.timer-display.running { color: var(--accent-cyan); }

.timer-display .seconds {
  font-size: 2.4rem;
  opacity: 0.5;
  margin-left: 2px;
}

.timer-controls {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  width: 100%;
  max-width: 440px;
}

.timer-input-row {
  display: flex;
  gap: 10px;
  width: 100%;
}

.timer-input {
  flex: 1;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 14px 18px;
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 0.9rem;
  outline: none;
  transition: all 0.25s ease;
}

.timer-input:focus {
  border-color: rgba(80,220,210,0.3);
  box-shadow: 0 0 0 3px rgba(80,220,210,0.08);
}

.timer-input::placeholder { color: var(--text-tertiary); }

.project-select {
  width: 160px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 14px 14px;
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 0.9rem;
  outline: none;
  cursor: pointer;
  appearance: none;
  background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%238b8ea3' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: right 14px center;
  transition: all 0.25s ease;
}

.project-select:focus {
  border-color: rgba(80,220,210,0.3);
  box-shadow: 0 0 0 3px rgba(80,220,210,0.08);
}

.timer-btn {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
  position: relative;
  overflow: hidden;
}

.timer-btn.start {
  background: linear-gradient(135deg, var(--accent-cyan), #3bbfb8);
  box-shadow: 0 4px 24px rgba(80,220,210,0.25);
}

.timer-btn.start:hover {
  transform: scale(1.08);
  box-shadow: 0 6px 32px rgba(80,220,210,0.35);
}

.timer-btn.start:active { transform: scale(0.96); }

.timer-btn.stop {
  background: linear-gradient(135deg, var(--accent-rose), #d84060);
  box-shadow: 0 4px 24px rgba(240,104,136,0.25);
}

.timer-btn.stop:hover {
  transform: scale(1.08);
  box-shadow: 0 6px 32px rgba(240,104,136,0.35);
}

.timer-btn.stop:active { transform: scale(0.96); }

.timer-btn svg {
  width: 22px;
  height: 22px;
  fill: white;
  position: relative;
  z-index: 1;
}

/* Today's entries on timer page */
.today-section {
  margin-top: 44px;
}

.section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}

.section-title {
  font-family: var(--font-display);
  font-size: 1rem;
  font-weight: 600;
  color: var(--text-secondary);
  letter-spacing: -0.01em;
}

.today-total {
  font-family: var(--font-mono);
  font-size: 0.85rem;
  color: var(--accent-cyan);
  font-weight: 500;
}

/* ═══ Entry Cards ═══ */
.entries-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.entry-card {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 18px;
  background: var(--glass);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-md);
  transition: all 0.2s ease;
  animation: slideIn 0.3s ease;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateX(-12px); }
  to { opacity: 1; transform: translateX(0); }
}

.entry-card:hover {
  background: var(--bg-hover);
  border-color: rgba(255,255,255,0.1);
}

.entry-color-bar {
  width: 3px;
  height: 32px;
  border-radius: 3px;
  flex-shrink: 0;
}

.entry-info { flex: 1; min-width: 0; }

.entry-task {
  font-size: 0.88rem;
  font-weight: 500;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.entry-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 3px;
}

.entry-project-tag {
  font-size: 0.7rem;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 4px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.entry-time-range {
  font-size: 0.75rem;
  color: var(--text-tertiary);
  font-family: var(--font-mono);
}

.entry-duration {
  font-family: var(--font-mono);
  font-size: 0.88rem;
  font-weight: 500;
  color: var(--text-primary);
  white-space: nowrap;
  margin-left: auto;
}

.entry-actions {
  display: flex;
  gap: 4px;
  opacity: 0;
  transition: opacity 0.2s ease;
}

.entry-card:hover .entry-actions { opacity: 1; }

.entry-action-btn {
  width: 30px;
  height: 30px;
  border-radius: 6px;
  border: none;
  background: transparent;
  color: var(--text-tertiary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s ease;
}

.entry-action-btn:hover {
  background: var(--bg-surface);
  color: var(--text-secondary);
}

.entry-action-btn.delete:hover {
  background: var(--accent-rose-dim);
  color: var(--accent-rose);
}

.entry-action-btn svg { width: 14px; height: 14px; }

/* Empty state */
.empty-state {
  text-align: center;
  padding: 48px 20px;
  color: var(--text-tertiary);
}

.empty-state-icon {
  font-size: 2.5rem;
  margin-bottom: 12px;
  opacity: 0.4;
}

.empty-state-text {
  font-size: 0.9rem;
  line-height: 1.6;
}

/* ═══ History View ═══ */
.history-toolbar {
  display: flex;
  gap: 10px;
  align-items: center;
  margin-bottom: 24px;
  flex-wrap: wrap;
}

.search-input {
  flex: 1;
  min-width: 200px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 10px 16px 10px 38px;
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 0.88rem;
  outline: none;
  transition: all 0.25s ease;
  background-image: url("data:image/svg+xml,%3Csvg width='16' height='16' viewBox='0 0 24 24' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='11' cy='11' r='7' stroke='%23555770' stroke-width='2'/%3E%3Cpath d='M16 16L20 20' stroke='%23555770' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: 14px center;
}

.search-input:focus {
  border-color: rgba(80,220,210,0.3);
  box-shadow: 0 0 0 3px rgba(80,220,210,0.08);
}

.filter-select {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 10px 32px 10px 14px;
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 0.88rem;
  outline: none;
  cursor: pointer;
  appearance: none;
  background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%238b8ea3' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: right 12px center;
  transition: all 0.25s ease;
}

.filter-select:focus {
  border-color: rgba(80,220,210,0.3);
}

.day-group { margin-bottom: 28px; }

.day-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
  padding: 0 4px;
}

.day-date {
  font-family: var(--font-display);
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text-secondary);
}

.day-total {
  font-family: var(--font-mono);
  font-size: 0.8rem;
  color: var(--text-tertiary);
}

/* ═══ Reports View ═══ */
.reports-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 28px;
}

.stat-card {
  background: var(--glass);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-lg);
  padding: 22px 24px;
  transition: all 0.25s ease;
}

.stat-card:hover {
  border-color: rgba(255,255,255,0.1);
  transform: translateY(-2px);
}

.stat-label {
  font-size: 0.75rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-tertiary);
  margin-bottom: 8px;
}

.stat-value {
  font-family: var(--font-display);
  font-size: 1.75rem;
  font-weight: 600;
  color: var(--text-primary);
  letter-spacing: -0.03em;
}

.stat-value .unit {
  font-size: 0.9rem;
  color: var(--text-secondary);
  font-weight: 400;
  margin-left: 4px;
}

.stat-change {
  font-size: 0.75rem;
  margin-top: 6px;
  color: var(--accent-green);
}

/* Period selector */
.period-selector {
  display: flex;
  gap: 4px;
  background: var(--bg-surface);
  border-radius: var(--radius-sm);
  padding: 3px;
  width: fit-content;
  margin-bottom: 28px;
}

.period-btn {
  padding: 7px 16px;
  border-radius: 6px;
  border: none;
  background: transparent;
  color: var(--text-secondary);
  font-family: var(--font-body);
  font-size: 0.8rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
}

.period-btn:hover { color: var(--text-primary); }

.period-btn.active {
  background: var(--bg-elevated);
  color: var(--text-primary);
  box-shadow: 0 1px 4px rgba(0,0,0,0.2);
}

/* Bar chart */
.chart-section {
  margin-bottom: 32px;
}

.chart-title {
  font-family: var(--font-display);
  font-size: 1rem;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 20px;
}

.bar-chart {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  height: 180px;
  padding: 0 4px;
}

.bar-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  height: 100%;
  justify-content: flex-end;
}

.bar {
  width: 100%;
  max-width: 48px;
  border-radius: 6px 6px 2px 2px;
  background: linear-gradient(180deg, var(--accent-cyan), rgba(80,220,210,0.3));
  min-height: 2px;
  transition: height 0.6s cubic-bezier(0.4,0,0.2,1);
  position: relative;
  cursor: pointer;
}

.bar:hover { filter: brightness(1.2); }

.bar-tooltip {
  position: absolute;
  bottom: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  padding: 4px 8px;
  border-radius: 6px;
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--text-primary);
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.15s ease;
}

.bar:hover .bar-tooltip { opacity: 1; }

.bar-label {
  font-size: 0.72rem;
  color: var(--text-tertiary);
  font-weight: 500;
}

.bar-col.today .bar-label { color: var(--accent-cyan); }
.bar-col.today .bar {
  background: linear-gradient(180deg, var(--accent-cyan), rgba(80,220,210,0.5));
  box-shadow: 0 0 16px rgba(80,220,210,0.2);
}

/* Project breakdown */
.project-breakdown {
  background: var(--glass);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-lg);
  padding: 24px;
}

.breakdown-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 10px 0;
}

.breakdown-item + .breakdown-item {
  border-top: 1px solid var(--border);
}

.breakdown-color {
  width: 10px;
  height: 10px;
  border-radius: 3px;
  flex-shrink: 0;
}

.breakdown-name {
  font-size: 0.88rem;
  font-weight: 500;
  color: var(--text-primary);
  flex: 1;
}

.breakdown-bar-track {
  width: 120px;
  height: 6px;
  border-radius: 3px;
  background: var(--bg-surface);
  overflow: hidden;
}

.breakdown-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
}

.breakdown-time {
  font-family: var(--font-mono);
  font-size: 0.8rem;
  color: var(--text-secondary);
  width: 60px;
  text-align: right;
}

.breakdown-pct {
  font-size: 0.75rem;
  color: var(--text-tertiary);
  width: 40px;
  text-align: right;
}

/* ═══ Modal / Edit Overlay ═══ */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  animation: fadeOverlay 0.2s ease;
}

.modal-overlay.open { display: flex; }

@keyframes fadeOverlay {
  from { opacity: 0; }
  to { opacity: 1; }
}

.modal {
  background: var(--bg-elevated);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-lg);
  padding: 28px;
  width: 420px;
  max-width: 90vw;
  animation: modalIn 0.3s cubic-bezier(0.4,0,0.2,1);
}

@keyframes modalIn {
  from { opacity: 0; transform: scale(0.95) translateY(10px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

.modal-title {
  font-family: var(--font-display);
  font-size: 1.15rem;
  font-weight: 600;
  margin-bottom: 22px;
  color: var(--text-primary);
}

.form-group { margin-bottom: 16px; }

.form-label {
  display: block;
  font-size: 0.78rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-tertiary);
  margin-bottom: 7px;
}

.form-input {
  width: 100%;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 0.88rem;
  outline: none;
  transition: all 0.2s ease;
}

.form-input:focus {
  border-color: rgba(80,220,210,0.3);
  box-shadow: 0 0 0 3px rgba(80,220,210,0.08);
}

.form-row {
  display: flex;
  gap: 12px;
}

.form-row .form-group { flex: 1; }

.modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  margin-top: 24px;
}

.btn {
  padding: 9px 18px;
  border-radius: var(--radius-sm);
  border: none;
  font-family: var(--font-body);
  font-size: 0.85rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
}

.btn-ghost {
  background: transparent;
  color: var(--text-secondary);
}

.btn-ghost:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}

.btn-primary {
  background: var(--accent-cyan);
  color: var(--bg-deep);
}

.btn-primary:hover {
  filter: brightness(1.1);
  transform: translateY(-1px);
}

/* ═══ Project Manager (inside modal) ═══ */
.manage-projects-btn {
  padding: 8px 14px;
  border-radius: var(--radius-sm);
  border: 1px dashed var(--border);
  background: transparent;
  color: var(--text-secondary);
  font-size: 0.8rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
}

.manage-projects-btn:hover {
  border-color: var(--accent-cyan);
  color: var(--accent-cyan);
  background: var(--accent-cyan-dim);
}

.project-list-manage { margin-top: 12px; }

.project-manage-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 0;
}

.project-manage-item + .project-manage-item {
  border-top: 1px solid var(--border);
}

.project-manage-color {
  width: 14px;
  height: 14px;
  border-radius: 4px;
  flex-shrink: 0;
}

.project-manage-name {
  flex: 1;
  font-size: 0.88rem;
  color: var(--text-primary);
}

.project-manage-delete {
  width: 28px;
  height: 28px;
  border-radius: 6px;
  border: none;
  background: transparent;
  color: var(--text-tertiary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s ease;
}

.project-manage-delete:hover {
  background: var(--accent-rose-dim);
  color: var(--accent-rose);
}

.add-project-row {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}

.add-project-row input {
  flex: 1;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 12px;
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 0.85rem;
  outline: none;
}

.add-project-row input:focus {
  border-color: rgba(80,220,210,0.3);
}

.color-picker-mini {
  display: flex;
  gap: 4px;
  align-items: center;
}

.color-swatch {
  width: 22px;
  height: 22px;
  border-radius: 5px;
  cursor: pointer;
  border: 2px solid transparent;
  transition: all 0.15s ease;
}

.color-swatch:hover { transform: scale(1.15); }
.color-swatch.selected { border-color: white; }

/* ═══ Mobile Responsive ═══ */
.mobile-header {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 56px;
  background: var(--bg-base);
  border-bottom: 1px solid var(--border);
  z-index: 99;
  align-items: center;
  padding: 0 16px;
}

.hamburger {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  border: none;
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

.mobile-logo {
  font-family: var(--font-display);
  font-size: 1.1rem;
  font-weight: 600;
  margin-left: 12px;
  color: var(--text-primary);
}

.sidebar-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 99;
}

@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); z-index: 200; }
  .sidebar.open { transform: translateX(0); }
  .sidebar-backdrop.open { display: block; }
  .mobile-header { display: flex; }
  .main { margin-left: 0; padding-top: 56px; }
  .view { padding: 24px 18px; }
  .reports-grid { grid-template-columns: 1fr; }
  .timer-display { font-size: 3rem; }
  .timer-display .seconds { font-size: 1.8rem; }
  .timer-ring-container { width: 220px; height: 220px; }
  .bar-chart { height: 140px; }
}

/* ═══ Scrollbar ═══ */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb {
  background: var(--bg-hover);
  border-radius: 3px;
}
::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }

/* ═══ Selection ═══ */
::selection {
  background: rgba(80,220,210,0.25);
  color: var(--text-primary);
}
</style>
</head>
<body>

<div class="app">
  <!-- Mobile Header -->
  <div class="mobile-header">
    <button class="hamburger" onclick="toggleSidebar()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
    </button>
    <span class="mobile-logo">Chronos</span>
  </div>
  <div class="sidebar-backdrop" onclick="toggleSidebar()"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent-cyan)" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
        </div>
        <span class="logo-text">Chronos</span>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-label">Workspace</div>
      <div class="nav-item active" data-view="timer" onclick="switchView('timer')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
        Timer
      </div>
      <div class="nav-item" data-view="history" onclick="switchView('history')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 8v4l3 3"/><path d="M3.05 11a9 9 0 1 1 .5 4"/><path d="M3 16v-5h5"/></svg>
        History
      </div>
      <div class="nav-item" data-view="reports" onclick="switchView('reports')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
        Reports
      </div>
      <div class="nav-label" style="margin-top:12px">Manage</div>
      <div class="nav-item" onclick="openProjectManager()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        Projects
      </div>
    </nav>
    <div class="theme-switcher" onclick="toggleTheme()">
      <div class="theme-switch-track">
        <div class="theme-switch-thumb"></div>
      </div>
      <span class="theme-label" id="themeLabel">Hot Girl Mode</span>
    </div>
    <div class="sidebar-timer-indicator" id="sidebarTimer" onclick="switchView('timer')">
      <div class="pulse-dot"></div>
      <div>
        <div class="sidebar-timer-text" id="sidebarTimerText">00:00:00</div>
        <div class="sidebar-timer-project" id="sidebarTimerProject">No task</div>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main">

    <!-- Timer View -->
    <section class="view active" id="view-timer">
      <div class="timer-hero">
        <div class="timer-ring-container">
          <div class="timer-ring" id="timerRing">
            <div class="orbital-dot"></div>
          </div>
          <div class="timer-glow" id="timerGlow"></div>
          <div class="timer-display" id="timerDisplay">00:00<span class="seconds">:00</span></div>
        </div>
        <div class="timer-controls">
          <div class="timer-input-row">
            <input type="text" class="timer-input" id="taskInput" placeholder="What are you working on?" maxlength="100">
            <select class="project-select" id="projectSelect"></select>
          </div>
          <button class="timer-btn start" id="timerBtn" onclick="toggleTimer()">
            <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
          </button>
        </div>
      </div>
      <div class="today-section">
        <div class="section-header">
          <span class="section-title">Today</span>
          <span class="today-total" id="todayTotal">0h 0m</span>
        </div>
        <div class="entries-list" id="todayEntries"></div>
      </div>
    </section>

    <!-- History View -->
    <section class="view" id="view-history">
      <div class="view-header">
        <h1 class="view-title">History</h1>
        <p class="view-subtitle">All your tracked time entries</p>
      </div>
      <div class="history-toolbar">
        <input type="text" class="search-input" id="historySearch" placeholder="Search entries..." oninput="renderHistory()">
        <select class="filter-select" id="historyFilter" onchange="renderHistory()">
          <option value="all">All Projects</option>
        </select>
      </div>
      <div id="historyContent"></div>
    </section>

    <!-- Reports View -->
    <section class="view" id="view-reports">
      <div class="view-header">
        <h1 class="view-title">Reports</h1>
        <p class="view-subtitle">Insights into your time</p>
      </div>
      <div class="period-selector">
        <button class="period-btn active" data-period="week" onclick="setPeriod('week')">This Week</button>
        <button class="period-btn" data-period="month" onclick="setPeriod('month')">This Month</button>
        <button class="period-btn" data-period="all" onclick="setPeriod('all')">All Time</button>
      </div>
      <div class="reports-grid" id="statsGrid"></div>
      <div class="chart-section">
        <div class="chart-title">Daily Hours</div>
        <div class="bar-chart" id="barChart"></div>
      </div>
      <div class="chart-section">
        <div class="chart-title">By Project</div>
        <div class="project-breakdown" id="projectBreakdown"></div>
      </div>
    </section>

  </main>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-title">Edit Entry</div>
    <div class="form-group">
      <label class="form-label">Task</label>
      <input type="text" class="form-input" id="editTask">
    </div>
    <div class="form-group">
      <label class="form-label">Project</label>
      <select class="form-input" id="editProject"></select>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Start Time</label>
        <input type="datetime-local" class="form-input" id="editStart">
      </div>
      <div class="form-group">
        <label class="form-label">End Time</label>
        <input type="datetime-local" class="form-input" id="editEnd">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeEditModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEdit()">Save</button>
    </div>
  </div>
</div>

<!-- Project Manager Modal -->
<div class="modal-overlay" id="projectModal">
  <div class="modal">
    <div class="modal-title">Manage Projects</div>
    <div class="project-list-manage" id="projectListManage"></div>
    <div class="add-project-row">
      <input type="text" id="newProjectName" placeholder="New project name..." maxlength="30">
      <div class="color-picker-mini" id="colorPicker"></div>
      <button class="btn btn-primary" onclick="addProject()" style="padding:8px 14px;font-size:0.8rem;">Add</button>
    </div>
    <div class="modal-actions" style="margin-top:20px">
      <button class="btn btn-ghost" onclick="closeProjectModal()">Done</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════
// State & Data
// ═══════════════════════════════════════
const PROJECT_COLORS = [
  { name: 'Cyan', color: '#50dcd2', dim: 'rgba(80,220,210,0.12)' },
  { name: 'Purple', color: '#9b7cf7', dim: 'rgba(155,124,247,0.12)' },
  { name: 'Amber', color: '#f0c050', dim: 'rgba(240,192,80,0.12)' },
  { name: 'Rose', color: '#f06888', dim: 'rgba(240,104,136,0.12)' },
  { name: 'Blue', color: '#5b9cf7', dim: 'rgba(91,156,247,0.12)' },
  { name: 'Green', color: '#5cd0a0', dim: 'rgba(92,208,160,0.12)' },
  { name: 'Orange', color: '#f09060', dim: 'rgba(240,144,96,0.12)' },
  { name: 'Pink', color: '#d07cf0', dim: 'rgba(208,124,240,0.12)' },
];

const DEFAULT_PROJECTS = [
  { id: 'p1', name: 'Work', colorIndex: 0 },
  { id: 'p2', name: 'Personal', colorIndex: 1 },
  { id: 'p3', name: 'Learning', colorIndex: 3 },
];

let state = {
  projects: [],
  entries: [],
  timer: { running: false, startTime: null, task: '', projectId: '' },
};

let timerInterval = null;
let editingEntryId = null;
let selectedColorIndex = 0;
let currentPeriod = 'week';

// ═══════════════════════════════════════
// Persistence
// ═══════════════════════════════════════
function loadState() {
  try {
    const saved = localStorage.getItem('chronos_state');
    if (saved) {
      const parsed = JSON.parse(saved);
      state.projects = parsed.projects || DEFAULT_PROJECTS;
      state.entries = parsed.entries || [];
      state.timer = parsed.timer || { running: false, startTime: null, task: '', projectId: '' };
    } else {
      state.projects = [...DEFAULT_PROJECTS];
    }
  } catch {
    state.projects = [...DEFAULT_PROJECTS];
  }
}

function saveState() {
  localStorage.setItem('chronos_state', JSON.stringify(state));
}

// ═══════════════════════════════════════
// Helpers
// ═══════════════════════════════════════
function genId() { return 'e' + Date.now() + Math.random().toString(36).slice(2, 7); }

function getProject(id) { return state.projects.find(p => p.id === id); }

function getProjectColor(id) {
  const p = getProject(id);
  if (!p) return PROJECT_COLORS[0];
  return PROJECT_COLORS[p.colorIndex] || PROJECT_COLORS[0];
}

function formatDuration(ms) {
  const totalSec = Math.floor(ms / 1000);
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  if (h > 0) return `${h}h ${m}m`;
  return `${m}m`;
}

function formatDurationLong(ms) {
  const totalSec = Math.floor(ms / 1000);
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function formatTime(date) {
  return new Date(date).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function formatDate(date) {
  const d = new Date(date);
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const target = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const diff = (today - target) / 86400000;

  if (diff === 0) return 'Today';
  if (diff === 1) return 'Yesterday';
  if (diff < 7) return d.toLocaleDateString([], { weekday: 'long' });
  return d.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' });
}

function getDateKey(date) {
  const d = new Date(date);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function isToday(date) {
  const d = new Date(date);
  const now = new Date();
  return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth() && d.getDate() === now.getDate();
}

function datetimeLocalValue(date) {
  const d = new Date(date);
  d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
  return d.toISOString().slice(0, 16);
}

function startOfWeek(date) {
  const d = new Date(date);
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  d.setDate(diff);
  d.setHours(0,0,0,0);
  return d;
}

function startOfMonth(date) {
  const d = new Date(date);
  d.setDate(1);
  d.setHours(0,0,0,0);
  return d;
}

// ═══════════════════════════════════════
// Timer
// ═══════════════════════════════════════
function toggleTimer() {
  if (state.timer.running) {
    stopTimer();
  } else {
    startTimer();
  }
}

function startTimer() {
  const task = document.getElementById('taskInput').value.trim() || 'Untitled';
  const projectId = document.getElementById('projectSelect').value;

  state.timer = {
    running: true,
    startTime: Date.now(),
    task,
    projectId,
  };
  saveState();
  updateTimerUI();
  timerInterval = setInterval(updateTimerDisplay, 1000);
}

function stopTimer() {
  if (!state.timer.running) return;

  const entry = {
    id: genId(),
    task: state.timer.task,
    projectId: state.timer.projectId,
    start: state.timer.startTime,
    end: Date.now(),
  };
  state.entries.unshift(entry);
  state.timer = { running: false, startTime: null, task: '', projectId: '' };
  saveState();

  clearInterval(timerInterval);
  timerInterval = null;
  updateTimerUI();
  renderTodayEntries();
  renderHistory();
  renderReports();
}

function updateTimerDisplay() {
  if (!state.timer.running) return;
  const elapsed = Date.now() - state.timer.startTime;
  const totalSec = Math.floor(elapsed / 1000);
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;

  const display = document.getElementById('timerDisplay');
  display.innerHTML = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}<span class="seconds">:${String(s).padStart(2,'0')}</span>`;

  const sidebarText = document.getElementById('sidebarTimerText');
  sidebarText.textContent = formatDurationLong(elapsed);
}

function updateTimerUI() {
  const btn = document.getElementById('timerBtn');
  const display = document.getElementById('timerDisplay');
  const ring = document.getElementById('timerRing');
  const glow = document.getElementById('timerGlow');
  const indicator = document.getElementById('sidebarTimer');
  const sidebarProject = document.getElementById('sidebarTimerProject');

  if (state.timer.running) {
    btn.className = 'timer-btn stop';
    btn.innerHTML = '<svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>';
    display.classList.add('running');
    ring.classList.add('running');
    glow.classList.add('running');
    indicator.classList.add('visible');
    sidebarProject.textContent = state.timer.task || 'Untitled';
    document.getElementById('taskInput').value = state.timer.task;
    document.getElementById('projectSelect').value = state.timer.projectId;
    updateTimerDisplay();
  } else {
    btn.className = 'timer-btn start';
    btn.innerHTML = '<svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>';
    display.classList.remove('running');
    display.innerHTML = '00:00<span class="seconds">:00</span>';
    ring.classList.remove('running');
    glow.classList.remove('running');
    indicator.classList.remove('visible');
  }
}

// ═══════════════════════════════════════
// Navigation
// ═══════════════════════════════════════
function switchView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-item[data-view]').forEach(n => n.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  document.querySelector(`.nav-item[data-view="${name}"]`).classList.add('active');

  if (name === 'history') renderHistory();
  if (name === 'reports') renderReports();

  // Close mobile sidebar
  document.getElementById('sidebar').classList.remove('open');
  document.querySelector('.sidebar-backdrop').classList.remove('open');
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.querySelector('.sidebar-backdrop').classList.toggle('open');
}

// ═══════════════════════════════════════
// Render: Project Selects
// ═══════════════════════════════════════
function renderProjectSelects() {
  const selects = [
    document.getElementById('projectSelect'),
    document.getElementById('editProject'),
    document.getElementById('historyFilter'),
  ];

  selects.forEach((sel, i) => {
    if (!sel) return;
    const val = sel.value;
    if (i === 2) {
      sel.innerHTML = '<option value="all">All Projects</option>';
    } else {
      sel.innerHTML = '';
    }
    state.projects.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p.id;
      opt.textContent = p.name;
      sel.appendChild(opt);
    });
    if (val) sel.value = val;
  });
}

// ═══════════════════════════════════════
// Render: Today Entries
// ═══════════════════════════════════════
function renderTodayEntries() {
  const container = document.getElementById('todayEntries');
  const todayEntries = state.entries.filter(e => isToday(e.start));

  if (todayEntries.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">⏱</div>
        <div class="empty-state-text">No entries yet today.<br>Start tracking to see your progress.</div>
      </div>`;
    document.getElementById('todayTotal').textContent = '0h 0m';
    return;
  }

  const totalMs = todayEntries.reduce((sum, e) => sum + (e.end - e.start), 0);
  document.getElementById('todayTotal').textContent = formatDuration(totalMs);

  container.innerHTML = todayEntries.map(e => renderEntryCard(e)).join('');
}

function renderEntryCard(entry) {
  const pc = getProjectColor(entry.projectId);
  const proj = getProject(entry.projectId);
  const duration = entry.end - entry.start;

  return `
    <div class="entry-card" data-id="${entry.id}">
      <div class="entry-color-bar" style="background:${pc.color}"></div>
      <div class="entry-info">
        <div class="entry-task">${escHtml(entry.task)}</div>
        <div class="entry-meta">
          <span class="entry-project-tag" style="background:${pc.dim};color:${pc.color}">${proj ? escHtml(proj.name) : 'Unknown'}</span>
          <span class="entry-time-range">${formatTime(entry.start)} — ${formatTime(entry.end)}</span>
        </div>
      </div>
      <div class="entry-duration">${formatDuration(duration)}</div>
      <div class="entry-actions">
        <button class="entry-action-btn" onclick="openEditModal('${entry.id}')" title="Edit">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="entry-action-btn delete" onclick="deleteEntry('${entry.id}')" title="Delete">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
        </button>
      </div>
    </div>`;
}

function escHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ═══════════════════════════════════════
// Render: History
// ═══════════════════════════════════════
function renderHistory() {
  const container = document.getElementById('historyContent');
  const search = document.getElementById('historySearch').value.toLowerCase();
  const filter = document.getElementById('historyFilter').value;

  let entries = [...state.entries];
  if (search) entries = entries.filter(e => e.task.toLowerCase().includes(search));
  if (filter !== 'all') entries = entries.filter(e => e.projectId === filter);

  if (entries.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">📋</div>
        <div class="empty-state-text">No entries found.</div>
      </div>`;
    return;
  }

  // Group by date
  const groups = {};
  entries.forEach(e => {
    const key = getDateKey(e.start);
    if (!groups[key]) groups[key] = [];
    groups[key].push(e);
  });

  const sortedKeys = Object.keys(groups).sort((a, b) => b.localeCompare(a));

  container.innerHTML = sortedKeys.map(key => {
    const dayEntries = groups[key];
    const totalMs = dayEntries.reduce((sum, e) => sum + (e.end - e.start), 0);
    return `
      <div class="day-group">
        <div class="day-header">
          <span class="day-date">${formatDate(dayEntries[0].start)}</span>
          <span class="day-total">${formatDuration(totalMs)}</span>
        </div>
        <div class="entries-list">
          ${dayEntries.map(e => renderEntryCard(e)).join('')}
        </div>
      </div>`;
  }).join('');
}

// ═══════════════════════════════════════
// Render: Reports
// ═══════════════════════════════════════
function setPeriod(period) {
  currentPeriod = period;
  document.querySelectorAll('.period-btn').forEach(b => b.classList.toggle('active', b.dataset.period === period));
  renderReports();
}

function renderReports() {
  const now = new Date();
  let periodStart;
  if (currentPeriod === 'week') periodStart = startOfWeek(now);
  else if (currentPeriod === 'month') periodStart = startOfMonth(now);
  else periodStart = new Date(0);

  const periodEntries = state.entries.filter(e => new Date(e.start) >= periodStart);
  const totalMs = periodEntries.reduce((sum, e) => sum + (e.end - e.start), 0);
  const totalHours = totalMs / 3600000;
  const uniqueDays = new Set(periodEntries.map(e => getDateKey(e.start))).size;
  const avgPerDay = uniqueDays > 0 ? totalHours / uniqueDays : 0;

  // Stats
  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Total Time</div>
      <div class="stat-value">${totalHours.toFixed(1)}<span class="unit">hrs</span></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Entries</div>
      <div class="stat-value">${periodEntries.length}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Active Days</div>
      <div class="stat-value">${uniqueDays}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Daily Average</div>
      <div class="stat-value">${avgPerDay.toFixed(1)}<span class="unit">hrs</span></div>
    </div>`;

  // Bar chart — last 7 days
  renderBarChart();

  // Project breakdown
  renderProjectBreakdown(periodEntries, totalMs);
}

function renderBarChart() {
  const chart = document.getElementById('barChart');
  const days = [];
  const now = new Date();
  const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  for (let i = 6; i >= 0; i--) {
    const d = new Date(now);
    d.setDate(d.getDate() - i);
    const key = getDateKey(d);
    const dayEntries = state.entries.filter(e => getDateKey(e.start) === key);
    const hours = dayEntries.reduce((sum, e) => sum + (e.end - e.start), 0) / 3600000;
    days.push({
      label: dayNames[d.getDay()],
      hours,
      isToday: i === 0,
    });
  }

  const maxHours = Math.max(...days.map(d => d.hours), 1);

  chart.innerHTML = days.map(d => {
    const pct = (d.hours / maxHours) * 100;
    return `
      <div class="bar-col ${d.isToday ? 'today' : ''}">
        <div class="bar" style="height:${Math.max(pct, 1.5)}%">
          <div class="bar-tooltip">${d.hours.toFixed(1)}h</div>
        </div>
        <span class="bar-label">${d.label}</span>
      </div>`;
  }).join('');
}

function renderProjectBreakdown(entries, totalMs) {
  const container = document.getElementById('projectBreakdown');
  const byProject = {};

  entries.forEach(e => {
    if (!byProject[e.projectId]) byProject[e.projectId] = 0;
    byProject[e.projectId] += (e.end - e.start);
  });

  const sorted = Object.entries(byProject).sort((a, b) => b[1] - a[1]);

  if (sorted.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="empty-state-text">No data for this period.</div></div>`;
    return;
  }

  const maxMs = sorted[0][1];

  container.innerHTML = sorted.map(([pid, ms]) => {
    const pc = getProjectColor(pid);
    const proj = getProject(pid);
    const pct = totalMs > 0 ? Math.round((ms / totalMs) * 100) : 0;
    const barPct = (ms / maxMs) * 100;
    return `
      <div class="breakdown-item">
        <div class="breakdown-color" style="background:${pc.color}"></div>
        <div class="breakdown-name">${proj ? escHtml(proj.name) : 'Unknown'}</div>
        <div class="breakdown-bar-track">
          <div class="breakdown-bar-fill" style="width:${barPct}%;background:${pc.color}"></div>
        </div>
        <div class="breakdown-time">${formatDuration(ms)}</div>
        <div class="breakdown-pct">${pct}%</div>
      </div>`;
  }).join('');
}

// ═══════════════════════════════════════
// Edit Modal
// ═══════════════════════════════════════
function openEditModal(id) {
  editingEntryId = id;
  const entry = state.entries.find(e => e.id === id);
  if (!entry) return;

  renderProjectSelects();
  document.getElementById('editTask').value = entry.task;
  document.getElementById('editProject').value = entry.projectId;
  document.getElementById('editStart').value = datetimeLocalValue(entry.start);
  document.getElementById('editEnd').value = datetimeLocalValue(entry.end);
  document.getElementById('editModal').classList.add('open');
}

function closeEditModal() {
  document.getElementById('editModal').classList.remove('open');
  editingEntryId = null;
}

function saveEdit() {
  const entry = state.entries.find(e => e.id === editingEntryId);
  if (!entry) return;

  entry.task = document.getElementById('editTask').value.trim() || 'Untitled';
  entry.projectId = document.getElementById('editProject').value;
  entry.start = new Date(document.getElementById('editStart').value).getTime();
  entry.end = new Date(document.getElementById('editEnd').value).getTime();

  if (entry.end <= entry.start) {
    entry.end = entry.start + 60000;
  }

  saveState();
  closeEditModal();
  renderTodayEntries();
  renderHistory();
  renderReports();
}

function deleteEntry(id) {
  state.entries = state.entries.filter(e => e.id !== id);
  saveState();
  renderTodayEntries();
  renderHistory();
  renderReports();
}

// ═══════════════════════════════════════
// Project Manager Modal
// ═══════════════════════════════════════
function openProjectManager() {
  selectedColorIndex = 0;
  renderProjectManagerModal();
  document.getElementById('projectModal').classList.add('open');
}

function closeProjectModal() {
  document.getElementById('projectModal').classList.remove('open');
  renderProjectSelects();
  renderTodayEntries();
  renderHistory();
  renderReports();
}

function renderProjectManagerModal() {
  const list = document.getElementById('projectListManage');
  list.innerHTML = state.projects.map(p => {
    const pc = PROJECT_COLORS[p.colorIndex] || PROJECT_COLORS[0];
    return `
      <div class="project-manage-item">
        <div class="project-manage-color" style="background:${pc.color}"></div>
        <div class="project-manage-name">${escHtml(p.name)}</div>
        <button class="project-manage-delete" onclick="deleteProject('${p.id}')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>`;
  }).join('');

  const picker = document.getElementById('colorPicker');
  picker.innerHTML = PROJECT_COLORS.map((c, i) =>
    `<div class="color-swatch ${i === selectedColorIndex ? 'selected' : ''}" style="background:${c.color}" onclick="selectColor(${i})"></div>`
  ).join('');
}

function selectColor(i) {
  selectedColorIndex = i;
  document.querySelectorAll('.color-swatch').forEach((s, idx) =>
    s.classList.toggle('selected', idx === i));
}

function addProject() {
  const name = document.getElementById('newProjectName').value.trim();
  if (!name) return;
  state.projects.push({
    id: 'p' + Date.now(),
    name,
    colorIndex: selectedColorIndex,
  });
  document.getElementById('newProjectName').value = '';
  saveState();
  renderProjectManagerModal();
}

function deleteProject(id) {
  state.projects = state.projects.filter(p => p.id !== id);
  saveState();
  renderProjectManagerModal();
}

// ═══════════════════════════════════════
// Close modals on backdrop click
// ═══════════════════════════════════════
document.getElementById('editModal').addEventListener('click', e => {
  if (e.target === document.getElementById('editModal')) closeEditModal();
});
document.getElementById('projectModal').addEventListener('click', e => {
  if (e.target === document.getElementById('projectModal')) closeProjectModal();
});

// Keyboard shortcut: Space to toggle timer when not typing
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;
  if (e.code === 'Space') {
    e.preventDefault();
    toggleTimer();
  }
});

// ═══════════════════════════════════════
// Theme Switcher
// ═══════════════════════════════════════
function toggleTheme() {
  const html = document.documentElement;
  html.classList.add('theme-transitioning');
  const current = html.getAttribute('data-theme');
  const next = current === 'hotgirl' ? '' : 'hotgirl';

  if (next) {
    html.setAttribute('data-theme', 'hotgirl');
  } else {
    html.removeAttribute('data-theme');
  }

  localStorage.setItem('chronos_theme', next);
  setTimeout(() => html.classList.remove('theme-transitioning'), 550);
}

function loadTheme() {
  const saved = localStorage.getItem('chronos_theme');
  if (saved === 'hotgirl') {
    document.documentElement.setAttribute('data-theme', 'hotgirl');
  }
}

// ═══════════════════════════════════════
// Init
// ═══════════════════════════════════════
function init() {
  loadTheme();
  loadState();
  renderProjectSelects();

  if (state.projects.length > 0 && !document.getElementById('projectSelect').value) {
    document.getElementById('projectSelect').value = state.projects[0].id;
  }

  // Resume timer if it was running
  if (state.timer.running) {
    updateTimerUI();
    timerInterval = setInterval(updateTimerDisplay, 1000);
  }

  renderTodayEntries();
  renderHistory();
  renderReports();
}

init();
</script>
</body>
</html>
